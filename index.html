```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>めざせ！爆発缶チャンピオン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #fff9f0; /* Warm Cream */
            color: #5d4037; /* Soft Brown */
            font-family: 'M PLUS Rounded 1c', sans-serif;
            overflow-x: hidden; 
        }
        .chiikawa-card {
            background: white;
            border: 4px solid #ffe0b2;
            border-radius: 2rem;
            box-shadow: 0 8px 0px #ffe0b2;
        }
        .guide-line { position: absolute; left: 0; width: 100%; height: 4px; cursor: ns-resize; z-index: 20; border-radius: 2px; }
        .line-label { 
            position: absolute; right: 10px; transform: translateY(-100%); 
            font-size: 14px; font-weight: bold; background: white; 
            padding: 4px 12px; border-radius: 999px; border: 2px solid currentColor;
        }
        .tap-marker { 
            position: absolute; width: 24px; height: 24px; 
            background: #ff8a80; border: 3px solid white;
            border-radius: 50%; transform: translate(-50%, -50%); 
            pointer-events: none; z-index: 30;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background: #ffccbc;
            border: 3px solid #ffab91;
            box-shadow: 0 4px 0px #ffab91;
            transition: all 0.1s;
        }
        .btn-primary:active { transform: translateY(4px); box-shadow: none; }
        .btn-record {
            background: #ff8a80;
            border: 3px solid #e57373;
            box-shadow: 0 4px 0px #e57373;
        }
        input[type="range"] { accent-color: #ffab91; }
        
        /* 録画中の赤丸アニメーション */
        .recording-dot {
            width: 12px; height: 12px; background: red; border-radius: 50%;
            display: inline-block; animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-6">
    <div id="app" class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-[#ff8a80] mb-2">ぷるぷる！ジャンプランク</h1>
            <p class="text-sm text-amber-700/60 font-bold">〜 みんなでいっしょに ぴょんぴょん！ 〜</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Viewport Area -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Main Display (Video/Camera) -->
                <div class="relative bg-[#fff3e0] rounded-[2.5rem] overflow-hidden aspect-video border-4 border-[#ffe0b2] shadow-inner" id="displayArea">
                    <!-- Video / Preview Element -->
                    <video id="mainVideo" class="w-full h-full object-contain bg-black hidden"></video>
                    <video id="cameraPreview" class="w-full h-full object-cover bg-slate-200" autoplay playsinline muted></video>
                    
                    <!-- Calibration Lines (Initially Hidden until measure mode) -->
                    <div id="calibrationGroup" class="hidden">
                        <div id="line1m" class="guide-line bg-sky-400 text-sky-500" style="top: 30%;">
                            <span class="line-label">1.0m くらい</span>
                        </div>
                        <div id="line0m" class="guide-line bg-amber-400 text-amber-500" style="top: 80%;">
                            <span class="line-label">じめん</span>
                        </div>
                    </div>

                    <!-- Marker Layer -->
                    <div id="markerLayer" class="absolute inset-0 pointer-events-none"></div>

                    <!-- Recording Indicator -->
                    <div id="recordingUI" class="absolute top-4 left-6 hidden items-center gap-2 bg-white/80 px-4 py-1 rounded-full border-2 border-red-400">
                        <span class="recording-dot"></span>
                        <span class="text-red-500 font-bold text-sm">ろくがちゅう...</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="chiikawa-card p-6 space-y-4">
                    <!-- Mode Tabs -->
                    <div class="flex gap-4 justify-center mb-4">
                        <button id="modeCam" class="px-6 py-2 rounded-full font-bold bg-[#ffecb3] border-2 border-[#ffd54f]">カメラ</button>
                        <button id="modeVideo" class="px-6 py-2 rounded-full font-bold bg-white border-2 border-[#e0e0e0] text-gray-400">計測モード</button>
                    </div>

                    <!-- Camera Controls -->
                    <div id="camControls" class="flex flex-wrap justify-center gap-4">
                        <button id="startRecordBtn" class="btn-record text-white px-8 py-3 rounded-full font-bold flex items-center gap-2">
                            <i class="fa-solid fa-circle"></i> ろくが はじめる
                        </button>
                        <button id="stopRecordBtn" class="bg-slate-400 text-white px-8 py-3 rounded-full font-bold hidden">
                            とめる
                        </button>
                        <label class="bg-sky-100 border-2 border-sky-200 text-sky-600 px-6 py-3 rounded-full font-bold cursor-pointer hover:bg-sky-200 transition">
                            ファイルから選ぶ
                            <input type="file" id="videoInput" accept="video/*" class="hidden">
                        </label>
                    </div>

                    <!-- Measurement Controls (Hidden by default) -->
                    <div id="measureControls" class="hidden space-y-4">
                        <div class="flex items-center gap-4">
                            <button id="playPauseBtn" class="w-12 h-12 flex items-center justify-center bg-amber-100 rounded-full border-2 border-amber-200 text-amber-600">
                                <span id="playIcon">▶</span>
                            </button>
                            <input type="range" id="videoSeek" min="0" max="1000" value="0" class="flex-grow h-3 bg-amber-50 rounded-lg appearance-none cursor-pointer border border-amber-100">
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex gap-2">
                                <button id="stepBack" class="px-4 py-2 bg-white border-2 border-slate-200 rounded-full text-xs font-bold">◀ ちょこっと戻る</button>
                                <button id="stepForward" class="px-4 py-2 bg-white border-2 border-slate-200 rounded-full text-xs font-bold">ちょこっと進む ▶</button>
                            </div>
                            <span id="timeDisplay" class="text-xs font-bold text-slate-400">00:00 / 00:00</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side -->
            <div class="space-y-6">
                <!-- Input Card -->
                <div class="chiikawa-card p-6 bg-[#fff9f0]">
                    <h3 class="text-xl font-bold mb-4 text-[#ff8a80] flex items-center gap-2">
                        <span class="text-2xl">✨</span> だれが跳んだ？
                    </h3>
                    <div class="space-y-5">
                        <input type="text" id="userName" placeholder="なまえをいれてね" class="w-full bg-white border-2 border-[#ffe0b2] rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-[#ffccbc] placeholder:text-slate-300">
                        
                        <div class="p-6 bg-white rounded-3xl border-2 border-[#ffe0b2] text-center">
                            <div class="text-xs text-amber-700/50 font-bold mb-1">今回のきろく</div>
                            <div class="text-5xl font-black text-[#5d4037]"><span id="currentJumpHeight">0.00</span><span class="text-lg ml-1 font-bold">m</span></div>
                        </div>
                        
                        <button id="saveBtn" class="btn-primary w-full text-white font-bold py-4 rounded-3xl text-lg disabled:opacity-30 disabled:cursor-not-allowed">
                            ランキングに のせる！
                        </button>
                    </div>
                </div>

                <!-- Ranking Card -->
                <div class="chiikawa-card p-6">
                    <div class="flex justify-between items-end mb-4">
                        <h3 class="text-xl font-bold text-[#ff8a80]">🏆 ランキング</h3>
                        <button id="clearBtn" class="text-[10px] text-slate-300 hover:text-red-300">ぜんぶ消す</button>
                    </div>
                    <div id="rankingList" class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                        <div class="text-center py-10 text-slate-300 text-sm italic font-bold">
                            まだだれもいないよ...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-[#81d4fa] text-white px-8 py-4 rounded-full shadow-xl opacity-0 transition-all pointer-events-none z-50 font-bold border-4 border-white">
        すごーい！保存したよ！
    </div>

    <script>
        // --- State ---
        const state = {
            mode: 'camera', // 'camera' or 'measure'
            videoLoaded: false,
            isRecording: false,
            y0: 0,
            y1: 0,
            currentY: 0,
            results: [],
            fps: 30,
            mediaRecorder: null,
            chunks: []
        };

        // --- DOM Elements ---
        const video = document.getElementById('mainVideo');
        const preview = document.getElementById('cameraPreview');
        const videoInput = document.getElementById('videoInput');
        const line0m = document.getElementById('line0m');
        const line1m = document.getElementById('line1m');
        const markerLayer = document.getElementById('markerLayer');
        const currentHeightEl = document.getElementById('currentJumpHeight');
        const saveBtn = document.getElementById('saveBtn');
        const rankingList = document.getElementById('rankingList');
        const recordBtn = document.getElementById('startRecordBtn');
        const stopBtn = document.getElementById('stopRecordBtn');
        const recordingUI = document.getElementById('recordingUI');
        const camControls = document.getElementById('camControls');
        const measureControls = document.getElementById('measureControls');
        const calibGroup = document.getElementById('calibrationGroup');
        const modeCam = document.getElementById('modeCam');
        const modeVideo = document.getElementById('modeVideo');

        // --- Camera & Recording Logic ---
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                preview.srcObject = stream;
            } catch (err) {
                console.error("Camera error:", err);
                alert("カメラがつかえないみたい...設定をみてみてね。");
            }
        }

        recordBtn.onclick = () => {
            state.chunks = [];
            const stream = preview.srcObject;
            state.mediaRecorder = new MediaRecorder(stream);
            state.mediaRecorder.ondataavailable = e => state.chunks.push(e.data);
            state.mediaRecorder.onstop = () => {
                const blob = new Blob(state.chunks, { type: 'video/mp4' });
                loadVideo(URL.createObjectURL(blob));
            };
            state.mediaRecorder.start();
            state.isRecording = true;
            recordBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            recordingUI.classList.remove('hidden');
            recordingUI.classList.add('flex');
        };

        stopBtn.onclick = () => {
            state.mediaRecorder.stop();
            state.isRecording = false;
            recordBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            recordingUI.classList.add('hidden');
            recordingUI.classList.remove('flex');
        };

        // --- Mode Switching ---
        function setMode(mode) {
            state.mode = mode;
            if (mode === 'camera') {
                preview.classList.remove('hidden');
                video.classList.add('hidden');
                camControls.classList.remove('hidden');
                measureControls.classList.add('hidden');
                calibGroup.classList.add('hidden');
                modeCam.classList.replace('bg-white', 'bg-[#ffecb3]');
                modeCam.classList.replace('text-gray-400', 'text-[#5d4037]');
                modeVideo.classList.replace('bg-[#ffecb3]', 'bg-white');
                modeVideo.classList.add('text-gray-400');
            } else {
                preview.classList.add('hidden');
                video.classList.remove('hidden');
                camControls.classList.add('hidden');
                measureControls.classList.remove('hidden');
                calibGroup.classList.remove('hidden');
                modeVideo.classList.replace('bg-white', 'bg-[#ffecb3]');
                modeVideo.classList.replace('text-gray-400', 'text-[#5d4037]');
                modeCam.classList.replace('bg-[#ffecb3]', 'bg-white');
                modeCam.classList.add('text-gray-400');
            }
        }

        function loadVideo(url) {
            video.src = url;
            state.videoLoaded = true;
            setMode('measure');
            saveBtn.disabled = false;
        }

        videoInput.onchange = (e) => {
            if (e.target.files[0]) loadVideo(URL.createObjectURL(e.target.files[0]));
        };

        modeCam.onclick = () => setMode('camera');
        modeVideo.onclick = () => { if(state.videoLoaded) setMode('measure'); };

        // --- Draggable Lines ---
        function setupDraggable(el) {
            let dragging = false;
            const start = () => dragging = true;
            const end = () => dragging = false;
            const move = (e) => {
                if (!dragging) return;
                const rect = document.getElementById('displayArea').getBoundingClientRect();
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                let y = clientY - rect.top;
                y = Math.max(0, Math.min(y, rect.height));
                el.style.top = `${y}px`;
                calculateHeight();
            };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', end);
            window.addEventListener('touchend', end);
        }
        setupDraggable(line0m);
        setupDraggable(line1m);

        // --- Video Controls ---
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const videoSeek = document.getElementById('videoSeek');
        const timeDisplay = document.getElementById('timeDisplay');

        playPauseBtn.onclick = () => {
            if (video.paused) {
                video.play();
                playIcon.textContent = '||';
            } else {
                video.pause();
                playIcon.textContent = '▶';
            }
        };

        video.ontimeupdate = () => {
            videoSeek.value = (video.currentTime / video.duration) * 1000;
            const cur = Math.floor(video.currentTime);
            const dur = Math.floor(video.duration || 0);
            timeDisplay.textContent = `${String(Math.floor(cur/60)).padStart(2,'0')}:${String(cur%60).padStart(2,'0')} / ${String(Math.floor(dur/60)).padStart(2,'0')}:${String(dur%60).padStart(2,'0')}`;
        };

        videoSeek.oninput = () => {
            video.currentTime = (videoSeek.value / 1000) * video.duration;
        };

        document.getElementById('stepForward').onclick = () => video.currentTime += (1/state.fps);
        document.getElementById('stepBack').onclick = () => video.currentTime -= (1/state.fps);

        // --- Measurement ---
        video.onclick = (e) => {
            if (state.mode !== 'measure') return;
            const rect = video.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            state.currentY = y;
            markerLayer.innerHTML = `<div class="tap-marker" style="top:${y}px; left:${x}px"></div>`;
            calculateHeight();
        };

        function calculateHeight() {
            const y0 = line0m.offsetTop;
            const y1 = line1m.offsetTop;
            const peak = state.currentY;
            if (y0 === y1 || peak === 0) return 0;
            const pxPerMeter = Math.abs(y0 - y1);
            const height = (y0 - peak) / pxPerMeter;
            const val = Math.max(0, height).toFixed(2);
            currentHeightEl.textContent = val;
            return parseFloat(val);
        }

        // --- Ranking ---
        saveBtn.onclick = () => {
            const h = calculateHeight();
            if (h <= 0) return;
            state.results.push({
                name: document.getElementById('userName').value || 'ななしさん',
                height: h,
                time: Date.now()
            });
            state.results.sort((a,b) => b.height - a.height);
            renderRanking();
            
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
            document.getElementById('userName').value = '';
        };

        function renderRanking() {
            if (state.results.length === 0) {
                rankingList.innerHTML = `<div class="text-center py-10 text-slate-300 text-sm italic font-bold">まだだれもいないよ...</div>`;
                return;
            }
            rankingList.innerHTML = state.results.map((r, i) => `
                <div class="flex items-center gap-3 bg-white p-4 rounded-[1.5rem] border-2 border-[#ffe0b2] shadow-sm">
                    <div class="w-10 h-10 flex items-center justify-center rounded-full ${i===0 ? 'bg-amber-400' : 'bg-amber-100'} text-white font-black">
                        ${i===0 ? '👑' : i+1}
                    </div>
                    <div class="flex-grow">
                        <div class="font-bold text-[#5d4037]">${r.name}</div>
                        <div class="text-[10px] text-slate-300 font-bold">${new Date(r.time).toLocaleTimeString()}</div>
                    </div>
                    <div class="text-2xl font-black text-[#ff8a80] italic">
                        ${r.height.toFixed(2)}<span class="text-xs ml-1 not-italic">m</span>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('clearBtn').onclick = () => {
            if(confirm('ぜんぶ消しちゃう？')) {
                state.results = [];
                renderRanking();
            }
        };

        // Start
        initCamera();
    </script>
</body>
</html>
