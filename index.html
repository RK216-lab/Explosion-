<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>めざせ！爆発缶チャンピオン</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fffaf3;
      --card: rgba(255,255,255,.96);
      --text: #6f4e37;
      --accent: #ff9993;
      --accent2: #ffd3a6;
      --line: #ffe2bf;
      --sky: #dff4ff;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 212, 227, .55) 0 10%, transparent 10.5%),
        radial-gradient(circle at 88% 12%, rgba(205, 237, 255, .50) 0 11%, transparent 11.5%),
        radial-gradient(circle at 16% 86%, rgba(255, 237, 190, .42) 0 11%, transparent 11.5%),
        radial-gradient(circle at 84% 84%, rgba(214, 243, 223, .40) 0 11%, transparent 11.5%),
        linear-gradient(180deg, #fffefb 0%, #fff7ed 100%);
      color: var(--text);
      font-family: 'Yusei Magic', sans-serif;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }
    * { box-sizing: border-box; }
    .app-shell { height: 100dvh; }
    .fluffy-card {
      background: var(--card);
      border: 3px solid rgba(255, 226, 191, .95);
      border-radius: 2rem;
      box-shadow: 0 10px 0 rgba(255, 226, 191, .82);
      backdrop-filter: blur(8px);
    }
    .soft-button {
      border-radius: 999px;
      border: 3px solid transparent;
      box-shadow: 0 5px 0 rgba(0,0,0,.08);
      transition: transform .08s ease, box-shadow .08s ease, opacity .2s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .soft-button:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.08); }
    .btn-cute {
      background: linear-gradient(180deg, #ffe7c9 0%, #ffd8b3 100%);
      border-color: #ffbea0;
      color: var(--text);
    }
    .btn-pink {
      background: linear-gradient(180deg, #ffb4ad 0%, #ff9993 100%);
      border-color: #ff7d7d;
      color: white;
    }
    .btn-sky {
      background: linear-gradient(180deg, #e7f8ff 0%, #d7f0ff 100%);
      border-color: #b8def2;
      color: #4b728a;
    }
    .ghost-pill {
      background: rgba(255,255,255,.72);
      border: 2px solid rgba(255, 226, 191, .9);
      border-radius: 999px;
    }
    .guide-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 18px;
      cursor: ns-resize;
      z-index: 20;
      border-radius: 999px;
      touch-action: none;
      display: flex;
      align-items: center;
    }
    .guide-line::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      opacity: .92;
      box-shadow: 0 0 0 4px rgba(255,255,255,.75);
    }
    .line-label {
      position: absolute;
      right: 12px;
      transform: translateY(-130%);
      font-size: 12px;
      font-weight: bold;
      background: rgba(255,255,255,.96);
      padding: 3px 10px;
      border-radius: 999px;
      border: 2px solid currentColor;
      white-space: nowrap;
    }
    .tap-marker {
      position: absolute;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border: 3px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 30;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
    }
    .tap-marker::after {
      content: "";
      position: absolute;
      inset: -8px;
      border: 2px solid rgba(255,153,147,.35);
      border-radius: 50%;
    }
    .recording-dot {
      width: 12px;
      height: 12px;
      background: #ff5b5b;
      border-radius: 50%;
      display: inline-block;
      animation: blink 1s infinite;
      box-shadow: 0 0 0 4px rgba(255, 91, 91, .14);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.86); }
    }
    input[type="range"] { accent-color: #ffb08f; touch-action: pan-x; }
    #rankingList {
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    .cute-title-shadow { text-shadow: 0 3px 0 rgba(255, 202, 177, .8); }
    .camera-frame {
      min-height: 58vh;
    }
    @media (min-width: 1024px) {
      .camera-frame {
        min-height: 0;
        aspect-ratio: 16 / 10;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell relative overflow-hidden">
    <div class="absolute rounded-full w-20 h-20 bg-[#ffd1dc] top-10 left-6 opacity-25 pointer-events-none"></div>
    <div class="absolute rounded-full w-16 h-16 bg-[#d9f3ff] top-24 right-8 opacity-25 pointer-events-none"></div>
    <div class="absolute rounded-full w-14 h-14 bg-[#fff0b8] bottom-20 left-10 opacity-25 pointer-events-none"></div>
    <div class="absolute rounded-full w-24 h-24 bg-[#d5f0df] bottom-10 right-10 opacity-25 pointer-events-none"></div>

    <div id="app" class="max-w-6xl mx-auto h-full flex flex-col p-3 md:p-5 relative z-10">
      <header class="text-center mb-3 md:mb-4 shrink-0">
        <div class="inline-flex items-center gap-2 ghost-pill px-4 py-2 mb-3">
          <span>🫧</span>
          <span class="text-xs md:text-sm text-[#8b6a57]">文化祭モード</span>
          <span>🫧</span>
        </div>
        <h1 class="text-3xl md:text-5xl font-bold text-[#ff8f8f] cute-title-shadow mb-1">めざせ！爆発缶チャンピオン</h1>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6 flex-1 min-h-0">
        <section class="lg:col-span-2 flex flex-col gap-4 min-h-0">
          <div id="displayArea" class="relative fluffy-card overflow-hidden camera-frame">
            <video id="mainVideo" class="w-full h-full object-contain bg-black hidden"></video>
            <video id="cameraPreview" class="w-full h-full object-cover bg-[#eee] object-center" autoplay playsinline muted></video>

            <div id="calibrationGroup" class="hidden">
              <div id="line1m" class="guide-line text-sky-500" style="top: 32%;">
                <span class="line-label text-sky-500">1.0m くらい</span>
              </div>
              <div id="line0m" class="guide-line text-amber-500" style="top: 80%;">
                <span class="line-label text-amber-500">じめん</span>
              </div>
            </div>

            <div id="markerLayer" class="absolute inset-0 pointer-events-none"></div>

            <div id="recordingUI" class="absolute top-4 left-4 hidden items-center gap-2 bg-white/85 px-4 py-2 rounded-full border-2 border-[#ff9f9a]">
              <span class="recording-dot"></span>
              <span class="text-[#ff6f6f] font-bold text-sm">ろくがちゅう...</span>
            </div>
          </div>

          <div class="fluffy-card p-4 md:p-5 space-y-4 min-h-0">
            <div class="flex gap-3 justify-center flex-wrap">
              <button id="modeCam" class="soft-button btn-cute px-5 py-2 font-bold">カメラ</button>
              <button id="modeVideo" class="soft-button bg-white border-2 border-[#e9d7c8] px-5 py-2 font-bold text-[#a7a7a7]">計測モード</button>
            </div>

            <div id="camControls" class="flex flex-wrap justify-center gap-3">
              <button id="startRecordBtn" class="soft-button btn-pink text-white px-6 py-3 font-bold flex items-center gap-2">
                <span>●</span> ろくが はじめる
              </button>
              <button id="stopRecordBtn" class="soft-button bg-slate-400 text-white px-6 py-3 font-bold hidden">とめる</button>
              <label class="soft-button btn-sky px-5 py-3 font-bold cursor-pointer">
                ファイルから選ぶ
                <input type="file" id="videoInput" accept="video/*" class="hidden">
              </label>
            </div>

            <div id="measureControls" class="hidden space-y-4 min-h-0">
              <div class="flex items-center gap-3">
                <button id="playPauseBtn" class="soft-button btn-cute w-12 h-12 flex items-center justify-center font-black">
                  <span id="playIcon">▶</span>
                </button>
                <input type="range" id="videoSeek" min="0" max="1000" value="0" class="flex-1 h-3 bg-amber-50 rounded-lg appearance-none cursor-pointer border border-amber-100">
              </div>
              <div class="flex justify-between items-center gap-3">
                <div class="flex gap-2 flex-wrap">
                  <button id="stepBack" class="soft-button bg-white border-2 border-[#e9d7c8] px-4 py-2 text-xs font-bold">◀ ちょこっと戻る</button>
                  <button id="stepForward" class="soft-button bg-white border-2 border-[#e9d7c8] px-4 py-2 text-xs font-bold">ちょこっと進む ▶</button>
                </div>
                <span id="timeDisplay" class="text-xs md:text-sm font-bold text-[#b39a8b] whitespace-nowrap">00:00 / 00:00</span>
              </div>
            </div>
          </div>
        </section>

        <aside class="flex flex-col gap-4 min-h-0">
          <div class="fluffy-card p-4 md:p-5">
            <h3 class="text-lg md:text-xl font-bold mb-3 text-[#ff8f8f] flex items-center gap-2">
              <span>✨</span> だれが跳んだ？
            </h3>

            <div class="space-y-4">
              <input type="text" id="userName" placeholder="なまえをいれてね"
                class="w-full bg-white border-2 border-[#ffe0b2] rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-[#ffbfa3] placeholder:text-slate-300">

              <div class="p-5 bg-white rounded-3xl border-2 border-[#ffe0b2] text-center">
                <div class="text-xs text-amber-700/60 font-bold mb-1">今回のきろく</div>
                <div class="text-4xl md:text-5xl font-black text-[#6f4e37]"><span id="currentJumpHeight">0.00</span><span class="text-lg ml-1 font-bold">m</span></div>
              </div>

              <button id="saveBtn" class="soft-button btn-cute w-full font-bold py-4 text-lg disabled:opacity-35 disabled:cursor-not-allowed">ランキングに のせる！</button>
            </div>
          </div>

          <div class="fluffy-card p-4 md:p-5 flex flex-col min-h-0 flex-1">
            <div class="flex justify-between items-end mb-3 shrink-0">
              <h3 class="text-lg md:text-xl font-bold text-[#ff8f8f]">🏆 ランキング</h3>
              <button id="clearBtn" class="text-[10px] text-slate-300 hover:text-red-300">ぜんぶ消す</button>
            </div>
            <div id="rankingList" class="flex-1 min-h-0 space-y-3 overflow-y-auto pr-2">
              <div class="text-center py-10 text-slate-300 text-sm italic font-bold">まだだれもいないよ...</div>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-[#8fd8ff] text-white px-6 py-3 rounded-full shadow-xl opacity-0 transition-all pointer-events-none z-50 font-bold border-4 border-white">すごーい！保存したよ！</div>
  </div>

  <script>
    // ==============================
    // GAS連携
    // ==============================
    const GAS_CONFIG = {
      ENABLE_UPLOAD: true,
      // GASのWebアプリURL
      WEB_APP_URL: 'https://script.google.com/macros/s/AKfycbxeXRjo3oXn9f881i1eIIYgyNhv0GygmB_mSF-8vCXnLTSQI29rS5UuEktvKdQy5WcWGw/exec',
      // 共有したくないなら、GAS側とこの文字をそろえる簡易キー
      SECRET: 'chiikawa-jump-2026'
    };

    const STORAGE_KEY = 'chiikawa_jump_rankings_v3';

    const state = {
      mode: 'camera',
      videoLoaded: false,
      isRecording: false,
      currentY: 0,
      results: [],
      fps: 30,
      mediaRecorder: null,
      chunks: [],
      audioCtx: null
    };

    const video = document.getElementById('mainVideo');
    const preview = document.getElementById('cameraPreview');
    const videoInput = document.getElementById('videoInput');
    const line0m = document.getElementById('line0m');
    const line1m = document.getElementById('line1m');
    const markerLayer = document.getElementById('markerLayer');
    const currentHeightEl = document.getElementById('currentJumpHeight');
    const saveBtn = document.getElementById('saveBtn');
    const rankingList = document.getElementById('rankingList');
    const recordBtn = document.getElementById('startRecordBtn');
    const stopBtn = document.getElementById('stopRecordBtn');
    const recordingUI = document.getElementById('recordingUI');
    const camControls = document.getElementById('camControls');
    const measureControls = document.getElementById('measureControls');
    const calibGroup = document.getElementById('calibrationGroup');
    const modeCam = document.getElementById('modeCam');
    const modeVideo = document.getElementById('modeVideo');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const videoSeek = document.getElementById('videoSeek');
    const timeDisplay = document.getElementById('timeDisplay');
    const toast = document.getElementById('toast');

    function loadLocalResults() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        state.results = raw ? JSON.parse(raw) : [];
      } catch {
        state.results = [];
      }
    }

    function saveLocalResults() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.results));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.style.opacity = '1';
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => {
        toast.style.opacity = '0';
      }, 1800);
    }

    async function ensureAudio() {
      if (!state.audioCtx) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        state.audioCtx = new AudioCtx();
      }
      if (state.audioCtx.state === 'suspended') {
        try { await state.audioCtx.resume(); } catch {}
      }
      return state.audioCtx;
    }

    async function playSfx(type) {
      const ctx = await ensureAudio();
      if (!ctx) return;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      const now = ctx.currentTime;
      const presets = {
        tap:   { t: 'triangle', f: [560, 760], d: 0.09, g: 0.06 },
        save:  { t: 'sine',     f: [660, 880, 1320], d: 0.15, g: 0.07 },
        start: { t: 'square',   f: [392, 523], d: 0.12, g: 0.05 },
        stop:  { t: 'sawtooth', f: [523, 392], d: 0.12, g: 0.05 },
        mode:  { t: 'triangle', f: [440, 660], d: 0.10, g: 0.05 },
        error: { t: 'sine',     f: [220, 180], d: 0.10, g: 0.04 }
      };
      const p = presets[type] || presets.tap;

      osc.type = p.t;
      osc.frequency.setValueAtTime(p.f[0], now);
      if (p.f.length > 1) {
        p.f.forEach((f, i) => osc.frequency.exponentialRampToValueAtTime(f, now + (p.d * (i + 1) / p.f.length)));
      }
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(p.g, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + p.d);

      osc.start(now);
      osc.stop(now + p.d + 0.02);
    }

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        preview.srcObject = stream;
      } catch (err) {
        console.error('Camera error:', err);
        alert('カメラがつかえないみたい...設定をみてみてね。');
      }
    }

    function setMode(mode) {
      state.mode = mode;

      if (mode === 'camera') {
        preview.classList.remove('hidden');
        video.classList.add('hidden');
        camControls.classList.remove('hidden');
        measureControls.classList.add('hidden');
        calibGroup.classList.add('hidden');

        modeCam.className = 'soft-button btn-cute px-5 py-2 font-bold';
        modeVideo.className = 'soft-button bg-white border-2 border-[#e9d7c8] px-5 py-2 font-bold text-[#a7a7a7]';
      } else {
        preview.classList.add('hidden');
        video.classList.remove('hidden');
        camControls.classList.add('hidden');
        measureControls.classList.remove('hidden');
        calibGroup.classList.remove('hidden');

        modeVideo.className = 'soft-button btn-cute px-5 py-2 font-bold';
        modeCam.className = 'soft-button bg-white border-2 border-[#e9d7c8] px-5 py-2 font-bold text-[#a7a7a7]';
      }
    }

    function pickRecorderMimeType() {
      const candidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm',
        'video/mp4'
      ];
      return candidates.find(t => window.MediaRecorder && MediaRecorder.isTypeSupported(t)) || '';
    }

    function loadVideo(url) {
      video.src = url;
      state.videoLoaded = true;
      setMode('measure');
      saveBtn.disabled = false;
      playIcon.textContent = '▶';
      currentHeightEl.textContent = '0.00';
      markerLayer.innerHTML = '';
    }

    function calculateHeight() {
      const y0 = line0m.offsetTop;
      const y1 = line1m.offsetTop;
      const peak = state.currentY;
      if (y0 === y1 || peak === 0) return 0;

      const pxPerMeter = Math.abs(y0 - y1);
      const height = (y0 - peak) / pxPerMeter;
      const val = Math.max(0, height).toFixed(2);
      currentHeightEl.textContent = val;
      return parseFloat(val);
    }

    function renderRanking() {
      if (state.results.length === 0) {
        rankingList.innerHTML = '<div class="text-center py-10 text-slate-300 text-sm italic font-bold">まだだれもいないよ...</div>';
        return;
      }

      rankingList.innerHTML = state.results.map((r, i) => `
        <div class="flex items-center gap-3 bg-white p-4 rounded-[1.4rem] border-2 border-[#ffe0b2] shadow-sm">
          <div class="w-10 h-10 shrink-0 flex items-center justify-center rounded-full ${i === 0 ? 'bg-amber-300' : 'bg-amber-100'} text-white font-black">
            ${i === 0 ? '👑' : i + 1}
          </div>
          <div class="flex-grow min-w-0">
            <div class="font-bold text-[#6f4e37] truncate">${String(r.name ?? 'ななしさん')}</div>
            <div class="text-[10px] text-slate-300 font-bold">${new Date(r.time || Date.now()).toLocaleTimeString()}</div>
          </div>
          <div class="text-2xl font-black text-[#ff8f8f] italic whitespace-nowrap">
            ${Number(r.height || 0).toFixed(2)}<span class="text-xs ml-1 not-italic">m</span>
          </div>
        </div>
      `).join('');
    }

    async function sendToGAS(record) {
  if (!GAS_CONFIG.ENABLE_UPLOAD) return;
  if (!GAS_CONFIG.WEB_APP_URL) return;

  try {
    await fetch(GAS_CONFIG.WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors', // ←これが超重要
      headers: {
        'Content-Type': 'text/plain;charset=utf-8' // ←これも重要
      },
      body: JSON.stringify({
        secret: GAS_CONFIG.SECRET,
        action: 'save',
        app: 'chiikawa-jump-rank',
        record
      })
    });
  } catch (err) {
    console.warn('GAS send failed:', err);
  }
}

    async function fetchFromGAS() {
      if (!GAS_CONFIG.ENABLE_UPLOAD) return;
      if (!GAS_CONFIG.WEB_APP_URL || GAS_CONFIG.WEB_APP_URL.includes('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE')) return;

      try {
        const url = `${GAS_CONFIG.WEB_APP_URL}?action=list&secret=${encodeURIComponent(GAS_CONFIG.SECRET)}&app=chiikawa-jump-rank`;
        const res = await fetch(url, { method: 'GET', cache: 'no-cache' });
        const data = await res.json();
        if (Array.isArray(data)) {
          state.results = data.sort((a, b) => b.height - a.height);
          saveLocalResults();
          renderRanking();
          showToast('GASから読みこんだよ');
        }
      } catch (err) {
        console.warn('GAS fetch failed:', err);
      }
    }

    function setupDraggableLine(el) {
      let dragging = false;
      let pointerId = null;

      const moveAt = (clientY) => {
        const rect = document.getElementById('displayArea').getBoundingClientRect();
        let y = clientY - rect.top;
        y = Math.max(0, Math.min(y, rect.height));
        el.style.top = `${y}px`;
        calculateHeight();
      };

      el.addEventListener('pointerdown', (e) => {
        dragging = true;
        pointerId = e.pointerId;
        el.setPointerCapture(pointerId);
        playSfx('tap');
        e.preventDefault();
      });

      el.addEventListener('pointermove', (e) => {
        if (!dragging || e.pointerId !== pointerId) return;
        moveAt(e.clientY);
        e.preventDefault();
      });

      const endDrag = (e) => {
        if (e.pointerId !== pointerId) return;
        dragging = false;
        try { el.releasePointerCapture(pointerId); } catch {}
        pointerId = null;
      };

      el.addEventListener('pointerup', endDrag);
      el.addEventListener('pointercancel', endDrag);
      el.addEventListener('pointerleave', () => {
        if (!dragging) return;
        dragging = false;
        pointerId = null;
      });
    }

    recordBtn.onclick = async () => {
      await playSfx('start');
      state.chunks = [];
      const stream = preview.srcObject;
      if (!stream) {
        await playSfx('error');
        alert('カメラがまだつながってないみたい...');
        return;
      }

      const mimeType = pickRecorderMimeType();
      try {
        state.mediaRecorder = mimeType
          ? new MediaRecorder(stream, { mimeType })
          : new MediaRecorder(stream);
      } catch (err) {
        console.error(err);
        await playSfx('error');
        alert('この端末では録画機能が使えないみたい...');
        return;
      }

      state.mediaRecorder.ondataavailable = e => state.chunks.push(e.data);
      state.mediaRecorder.onstop = () => {
        const blobType = state.chunks[0]?.type || state.mediaRecorder?.mimeType || 'video/webm';
        const blob = new Blob(state.chunks, { type: blobType });
        loadVideo(URL.createObjectURL(blob));
      };
      state.mediaRecorder.start();
      state.isRecording = true;
      recordBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');
      recordingUI.classList.remove('hidden');
      recordingUI.classList.add('flex');
    };

    stopBtn.onclick = async () => {
      await playSfx('stop');
      state.mediaRecorder?.stop();
      state.isRecording = false;
      recordBtn.classList.remove('hidden');
      stopBtn.classList.add('hidden');
      recordingUI.classList.add('hidden');
      recordingUI.classList.remove('flex');
    };

    videoInput.onchange = async (e) => {
      if (e.target.files[0]) {
        await playSfx('tap');
        loadVideo(URL.createObjectURL(e.target.files[0]));
      }
    };

    modeCam.onclick = async () => { await playSfx('mode'); setMode('camera'); };
    modeVideo.onclick = async () => { await playSfx('mode'); if (state.videoLoaded) setMode('measure'); };

    playPauseBtn.onclick = async () => {
      await playSfx('tap');
      if (video.paused) {
        await video.play();
        playIcon.textContent = '||';
      } else {
        video.pause();
        playIcon.textContent = '▶';
      }
    };

    video.ontimeupdate = () => {
      if (!video.duration || !isFinite(video.duration)) return;
      videoSeek.value = (video.currentTime / video.duration) * 1000;
      const cur = Math.floor(video.currentTime);
      const dur = Math.floor(video.duration || 0);
      timeDisplay.textContent = `${String(Math.floor(cur / 60)).padStart(2, '0')}:${String(cur % 60).padStart(2, '0')} / ${String(Math.floor(dur / 60)).padStart(2, '0')}:${String(dur % 60).padStart(2, '0')}`;
    };

    videoSeek.oninput = async () => {
      await ensureAudio();
      if (video.duration) video.currentTime = (videoSeek.value / 1000) * video.duration;
    };

    document.getElementById('stepForward').onclick = async () => {
      await playSfx('tap');
      video.currentTime += (1 / state.fps);
    };
    document.getElementById('stepBack').onclick = async () => {
      await playSfx('tap');
      video.currentTime -= (1 / state.fps);
    };

    video.onclick = async (e) => {
      if (state.mode !== 'measure') return;
      await playSfx('tap');
      const rect = video.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      state.currentY = y;
      markerLayer.innerHTML = `<div class="tap-marker" style="top:${y}px; left:${x}px"></div>`;
      calculateHeight();
    };

    saveBtn.onclick = async () => {
      const h = calculateHeight();
      if (h <= 0) {
        await playSfx('error');
        return;
      }

      await playSfx('save');

      const record = {
        name: document.getElementById('userName').value.trim() || 'ななしさん',
        height: h,
        time: Date.now()
      };

      state.results.push(record);
      state.results.sort((a, b) => b.height - a.height);
      saveLocalResults();
      renderRanking();
      document.getElementById('userName').value = '';
      showToast('すごーい！保存したよ！');
      sendToGAS(record);
    };

    document.getElementById('clearBtn').onclick = async () => {
      await playSfx('tap');
      if (confirm('ぜんぶ消しちゃう？')) {
        state.results = [];
        saveLocalResults();
        renderRanking();
      }
    };

    // Start
    loadLocalResults();
    renderRanking();
    setupDraggableLine(line0m);
    setupDraggableLine(line1m);
    initCamera();
    saveBtn.disabled = true;
    setMode('camera');
    setInterval(fetchFromGAS, 3000);
  </script>
</body>
</html>
